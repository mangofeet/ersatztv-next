name: Build Artifacts
on:
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag'
        required: true
        type: string
      release_version:
        description: 'Release version number (e.g. v0.1.0)'
        required: true
        type: string
      info_version:
        description: 'Informational version number (e.g. 0.1.0)'
        required: true
        type: string
    secrets:
      apple_developer_certificate_p12_base64:
        required: true
      apple_developer_certificate_password:
        required: true
      ac_username:
        required: true
      ac_password:
        required: true
      gh_token:
        required: true
      azure_client_id:
        required: true
      azure_tenant_id:
        required: true
      azure_subscription_id:
        required: true

permissions:
  id-token: write
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUSTDOCFLAGS: -Dwarnings

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: rustup update stable
      - run: rustup show active-toolchain
      - run: rustup component add rustfmt clippy

      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --workspace --all-features --all-targets -- -D clippy::all

  build_and_upload_linux:
    name: Build & Upload Linux
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            kind: linux
            target: linux-x64
            rust_target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            kind: linux
            target: linux-musl-x64
            rust_target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            kind: linux
            target: linux-arm
            rust_target: armv7-unknown-linux-gnueabihf
          - os: ubuntu-24.04-arm
            kind: linux
            target: linux-arm64
            rust_target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: rustup update stable
      - run: rustup show active-toolchain

      - name: Install cross-compilation tools
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.rust_target }}

      - name: Build
        shell: bash
        run: |
          # Define some variables for things we need
          release_name="ersatztv-next-${{ inputs.release_version }}-${{ matrix.target }}"
          echo "RELEASE_NAME=${release_name}" >> $GITHUB_ENV

          # Build everything
          cargo build --release --all-features
          mkdir "$release_name"
          mv target/${{ matrix.rust_target }}/release/ersatztv-channel "$release_name/"
          mv target/${{ matrix.rust_target }}/release/ersatztv-lineup "$release_name/"
          tar czvf "${release_name}.tar.gz" "$release_name"

          # Delete output directory
          rm -r "$release_name"

      - name: Delete old release assets
        uses: mknejp/delete-release-assets@v1
        if: ${{ inputs.release_tag == 'develop' }}
        with:
          token: ${{ secrets.gh_token }}
          tag: ${{ inputs.release_tag }}
          fail-if-no-assets: false
          assets: "*${{ matrix.target }}.tar.gz"

      - name: Publish
        uses: softprops/action-gh-release@v1
        with:
          prerelease: false
          tag_name: ${{ inputs.release_tag }}
          files: "${{ env.RELEASE_NAME }}.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.gh_token }}
