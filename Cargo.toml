[workspace]
members = [
  "crates/ersatztv",
  "crates/ersatztv-channel",
  "crates/ersatztv-playout",
  "crates/ffpipeline",
]
resolver = "3"

[workspace.dependencies]
axum = "0.8"
env_logger = "0.11"
ersatztv-playout = { path = "crates/ersatztv-playout" }
ffpipeline = { path = "crates/ffpipeline" }
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2.0"
tokio = { version = "1.50", features = ["macros", "rt-multi-thread"] }
toml = "1"
