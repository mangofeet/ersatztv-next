[workspace]
members = [
  "crates/ersatztv",
  "crates/ersatztv-channel",
  "crates/ersatztv-core",
  "crates/ersatztv-playout",
  "crates/ffpipeline",
]
resolver = "3"

[workspace.dependencies]
axum = "0.8"
clap = {  version = "4.6", features = ["derive"] }
env_logger = "0.11"
ersatztv-core = { path = "crates/ersatztv-core" }
ersatztv-playout = { path = "crates/ersatztv-playout" }
ffpipeline = { path = "crates/ffpipeline" }
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
simple-expand-tilde = "0.5.3"
thiserror = "2.0"
tokio = { version = "1.50", features = ["fs", "io-util", "macros", "process", "rt-multi-thread", "signal", "time"] }
toml = "1"
tower-http = { version = "0.6", features = ["fs"] }
